services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_PORT: 8000
    ports:
      - "8003:8000"
    depends_on:
      - db
      - mailhog
    command: >
      sh -c "./scripts/wait-for-db.sh db 5432 && /app/rust-auth-template"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    expose:
      - "1025"
      - "8025"

volumes:
  postgres_data:
